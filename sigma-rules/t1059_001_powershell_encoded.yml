title: PowerShell Encoded Command Execution
id: a1b2c3d4-0001-4000-8000-000000000001
status: stable
description: >
    Detects PowerShell launched with encoded command flags (-enc, -encodedcommand)
    or common in-memory execution primitives (IEX, Invoke-Expression, DownloadString).
    Adversaries use this to bypass script-block logging and hide payloads from
    casual command-line inspection.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://github.com/SwiftOnSecurity/sysmon-config
author: rootverdict
date: 2026-06-24
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains|any:
            - '-enc '
            - '-encodedcommand '
            - 'IEX'
            - 'Invoke-Expression'
            - 'DownloadString'
    condition: selection
falsepositives:
    - Legitimate software deployment tools using encoded commands (SCCM, Ansible)
    - Admin scripts that base64-encode payloads for safe transport
    - Known management tooling — baseline and whitelist by ParentImage
fields:
    - Image
    - CommandLine
    - ParentImage
    - ParentCommandLine
    - User
    - IntegrityLevel
level: high
